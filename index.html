<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey :)</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #ffe6eb;
    background-image: url('https://img.magnific.com/free-vector/baby-girl-editable-pattern_1108-199.jpg?semt=ais_hybrid&w=740&q=80');
    background-size: 300px;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

.box {
    background: white;
    width: 100%;
    max-width: 480px;
    padding: 30px;
    border-radius: 24px;
    box-shadow: 0 15px 35px rgba(255, 77, 109, 0.15);
    text-align: center;
    animation: fadeIn 0.4s ease;
    border: 3px solid #ffb3c1;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    color: #ff4d6d;
    margin-bottom: 20px;
    font-size: 24px;
    line-height: 1.4;
}

.btn-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    position: relative;
    min-height: 60px;
    align-items: center;
}

button, .submit-btn {
    padding: 12px 28px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.1s ease, background 0.2s;
}

button:active, .submit-btn:active {
    transform: scale(0.95);
}

#yesBtn {
    background: #ff4d6d;
    color: white;
}

#yesBtn:hover {
    background: #ff3355;
}

#noBtn {
    background: #e0e0e0;
    color: #555;
    position: relative;
    z-index: 10;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin: 20px 0;
}

.food-card {
    background: #fff5f7;
    border: 2px solid #ffe6eb;
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.food-card:hover {
    transform: translateY(-3px);
    border-color: #ffb3c1;
}

.food-card.selected {
    border-color: #ff4d6d;
    background: #ffe6eb;
    box-shadow: 0 5px 15px rgba(255, 77, 109, 0.2);
}

.food-emoji {
    font-size: 40px;
    display: block;
    margin-bottom: 8px;
}

.food-label {
    font-weight: bold;
    color: #555;
    font-size: 15px;
}

input {
    padding: 12px;
    margin: 10px 0;
    width: 100%;
    font-size: 16px;
    border: 2px solid #ffe6eb;
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s;
}

input:focus {
    border-color: #ff4d6d;
}

.next-btn, .submit-btn {
    background: #ff4d6d;
    color: white;
    width: 100%;
    margin-top: 15px;
}

.next-btn:hover, .submit-btn:hover {
    background: #ff3355;
}

#summary {
    line-height: 1.6;
}
</style>
</head>
<body>

<form action="https://formsubmit.co/your-email@gmail.com" method="POST" id="dateForm" style="width: 100%; display: flex; justify-content: center;">

    <input type="hidden" name="Food Chosen" id="hiddenFoodInput">

    <div class="box" id="step1">
        <h2>Will you go out with me?</h2>
        <div class="btn-container">
            <button type="button" id="yesBtn" onclick="yes()">Yes 🙂</button>
            <button type="button" id="noBtn" onmouseenter="moveNo()" ontouchstart="moveNo(); event.preventDefault();" onclick="no()">No 😅</button>
        </div>
    </div>

    <div class="box" id="step2" style="display:none;">
        <h2>Nice 😎 What food are you feeling?</h2>
        
        <div class="grid-container">
            <div class="food-card" onclick="selectFood(this, 'Pizza 🍕')">
                <span class="food-emoji">🍕</span>
                <span class="food-label">Pizza</span>
            </div>
            <div class="food-card" onclick="selectFood(this, 'Sushi 🍣')">
                <span class="food-emoji">🍣</span>
                <span class="food-label">Sushi</span>
            </div>
            <div class="food-card" onclick="selectFood(this, 'Colombian 🇨🇴')">
                <span class="food-emoji">🇨🇴</span>
                <span class="food-label">Colombian</span>
            </div>
            <div class="food-card" onclick="selectFood(this, 'Mexican 🌮')">
                <span class="food-emoji">🌮</span>
                <span class="food-label">Mexican</span>
            </div>
        </div>

        <button type="button" class="next-btn" onclick="next()">Next</button>
    </div>

    <div class="box" id="step3" style="display:none;">
        <h2>When are you free?</h2>
        <input type="date" name="Date Picked" id="date">
        <input type="time" name="Time Picked" id="time">
        <br>
        <button type="button" class="next-btn" onclick="validateAndSubmit(event)">Finish ✨</button>
    </div>

    <div class="box" id="final" style="display:none;">
        <h2>Thank you for making me the happiest guy alive 💙</h2>
        <p id="summary" style="font-size: 18px; color: #444; font-weight: 500;"></p>
    </div>

</form>

<script>
let selectedFoodValue = "";

document.getElementById('date').min = new Date().toISOString().split('T')[0];

function yes() {
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
}

function no() {
    alert("All good 🙂 thanks for being honest!");
}

function moveNo() {
    const btn = document.getElementById("noBtn");
    if (btn.style.position !== "fixed") {
        btn.style.position = "fixed";
    }
    const padding = 20;
    const x = Math.floor(Math.random() * (window.innerWidth - btn.offsetWidth - (padding * 2))) + padding;
    const y = Math.floor(Math.random() * (window.innerHeight - btn.offsetHeight - (padding * 2))) + padding;
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function selectFood(element, foodName) {
    const cards = document.querySelectorAll('.food-card');
    cards.forEach(card => card.classList.remove('selected'));
    
    element.classList.add('selected');
    selectedFoodValue = foodName;
    document.getElementById("hiddenFoodInput").value = foodName;
}

function next() {
    if (!selectedFoodValue) {
        alert("Pick a food option first! 😋");
